name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.28.3
          pip install httpx pillow fpdf2 requests

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Accept Android licenses
        run: |
          yes | flutter doctor --android-licenses || true

      - name: Use committed debug keystore
        run: |
          mkdir -p ~/.android
          cp android/debug.keystore ~/.android/debug.keystore

      - name: Read version and set build vars
        id: version
        run: |
          VER=$(cat version.txt)
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "build_number=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT

      - name: Build APK
        run: |
          flet build apk \
            --project "Mahalaxmi Bangles" \
            --product "Mahalaxmi Bangles" \
            --build-number ${{ steps.version.outputs.build_number }} \
            --build-version "${{ steps.version.outputs.version }}" \
            --arch arm64-v8a \
            --skip-flutter-doctor

      - name: Find APK file
        run: find . -name "*.apk" -type f

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mahalaxmi-bangles-v${{ steps.version.outputs.version }}
          path: |
            build/apk/**/*.apk
            **/*release*.apk
          retention-days: 30
          if-no-files-found: warn
