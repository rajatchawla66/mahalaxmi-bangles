name: mahalaxmi_admin
description: Mahalaxmi Admin App — inventory, pricing, order management, and customer sync
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  go_router: ^14.6.0
  supabase_flutter: ^2.8.0
  image_picker: ^1.1.0
  mahalaxmi_shared:
    path: ../mahalaxmi_shared
  intl: ^0.20.0
  printing: ^5.11.0
  crop_your_image: ^1.0.3
  share_plus: ^10.1.0
  path_provider: ^2.1.0
  image: ^4.8.0
  http: ^1.2.0
  shared_preferences: ^2.2.0
  # file_picker removed — replaced by native MethodChannel (ACTION_OPEN_DOCUMENT)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/mbadmin.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true
  assets:
    - assets/
