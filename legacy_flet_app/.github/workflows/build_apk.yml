name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.28.3
          pip install httpx pillow fpdf2 requests

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter 3.24.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Accept Android licenses
        run: |
          yes | flutter doctor --android-licenses || true

      - name: Decode release keystore from secrets
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $HOME/release.keystore

      - name: Read version and set build vars
        id: version
        run: |
          VER=$(cat version.txt)
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "build_number=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
          echo "Build number: $(git rev-list --count HEAD)"

      - name: Build APK
        env:
          FLET_ANDROID_SIGNING_KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          FLET_ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          [ -n "$FLET_ANDROID_SIGNING_KEY_STORE_PASSWORD" ] || { echo "Missing ANDROID_KEYSTORE_PASSWORD secret"; exit 1; }
          [ -n "$FLET_ANDROID_SIGNING_KEY_PASSWORD" ] || { echo "Missing ANDROID_KEY_PASSWORD secret"; exit 1; }

          MAX_RETRIES=2
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            RETRY=$((RETRY + 1))
            echo "--- Build attempt $RETRY of $MAX_RETRIES ---"
            if flet build apk \
              --project "Mahalaxmi Bangles" \
              --product "Mahalaxmi Bangles" \
              --build-number ${{ steps.version.outputs.build_number }} \
              --build-version "${{ steps.version.outputs.version }}" \
              --arch arm64-v8a \
              --skip-flutter-doctor \
              --android-signing-key-store $HOME/release.keystore \
              --android-signing-key-store-password "$FLET_ANDROID_SIGNING_KEY_STORE_PASSWORD" \
              --android-signing-key-password "$FLET_ANDROID_SIGNING_KEY_PASSWORD" \
              --android-signing-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}"; then
              echo "--- Build succeeded on attempt $RETRY ---"
              break
            fi
            if [ $RETRY -lt $MAX_RETRIES ]; then
              echo "Build failed on attempt $RETRY — cleaning partial Flutter download and retrying..."
              rm -rf "$HOME/flutter"
              rm -f "$HOME"/flutter_*.zip "$HOME"/flutter_*.tar.xz
            else
              echo "Build failed after $MAX_RETRIES attempts."
              exit 1
            fi
          done

      - name: Verify APK signature fingerprint
        run: |
          APK=$(find build/apk -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            echo "=== APK signer SHA256 ==="
            keytool -printcert -jarfile "$APK" 2>/dev/null | grep -i "SHA256" || echo "Could not extract fingerprint"
          else
            echo "No APK found for verification"
          fi

      - name: Find APK file
        run: find . -name "*.apk" -type f

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mahalaxmi-bangles-v${{ steps.version.outputs.version }}
          path: |
            build/apk/**/*.apk
            **/*release*.apk
          retention-days: 30
          if-no-files-found: warn
