name: Build Admin APK (Debug)

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create .env from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > mahalaxmi_admin/.env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> mahalaxmi_admin/.env

      - name: Build APK
        run: |
          cd mahalaxmi_admin
          flutter pub get
          flutter build apk --debug --dart-define-from-file=.env

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-debug-apk
          path: mahalaxmi_admin/build/app/outputs/flutter-apk/app-debug.apk
