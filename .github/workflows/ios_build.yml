name: Build iOS Admin (Unsigned IPA)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter dependencies
        run: cd mahalaxmi_admin && flutter pub get

      - name: Generate app icons
        run: cd mahalaxmi_admin && flutter pub run flutter_launcher_icons

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd mahalaxmi_admin
          if [ ! -f ios/Podfile ]; then
            echo "Creating Podfile (was not generated on Windows host)..."
            echo 'platform :ios, "13.0"' > ios/Podfile
            echo "" >> ios/Podfile
            echo 'ENV["COCOAPODS_DISABLE_STATS"] = "true"' >> ios/Podfile
            echo "" >> ios/Podfile
            echo 'project "Runner", {' >> ios/Podfile
            echo '  "Debug" => :debug,' >> ios/Podfile
            echo '  "Profile" => :release,' >> ios/Podfile
            echo '  "Release" => :release,' >> ios/Podfile
            echo '}' >> ios/Podfile
            echo "" >> ios/Podfile
            echo 'def flutter_root' >> ios/Podfile
            echo '  generated_xcode_build_settings_path = File.expand_path(File.join("..", "Flutter", "Generated.xcconfig"), __FILE__)' >> ios/Podfile
            echo '  unless File.exist?(generated_xcode_build_settings_path)' >> ios/Podfile
            echo '    generated_xcode_build_settings_path = File.expand_path(File.join("..", "Flutter", "ephemeral", "Flutter-Generated.xcconfig"), __FILE__)' >> ios/Podfile
            echo '  end' >> ios/Podfile
            echo '  unless File.exist?(generated_xcode_build_settings_path)' >> ios/Podfile
            echo '    raise "#{generated_xcode_build_settings_path} must exist. If you are running pod install manually, make sure \"flutter pub get\" is executed first"' >> ios/Podfile
            echo '  end' >> ios/Podfile
            echo '  File.foreach(generated_xcode_build_settings_path) do |line|' >> ios/Podfile
            echo '    matches = line.match(/FLUTTER_ROOT\\=(.*)/)' >> ios/Podfile
            echo '    return matches[1].strip if matches' >> ios/Podfile
            echo '  end' >> ios/Podfile
            echo '  raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}. Try deleting Flutter/Generated.xcconfig, then run flutter pub get"' >> ios/Podfile
            echo 'end' >> ios/Podfile
            echo "" >> ios/Podfile
            echo 'require File.expand_path(File.join("packages", "flutter_tools", "bin", "podhelper"), flutter_root)' >> ios/Podfile
            echo "" >> ios/Podfile
            echo 'flutter_ios_podfile_setup' >> ios/Podfile
            echo "" >> ios/Podfile
            echo 'target "Runner" do' >> ios/Podfile
            echo '  use_frameworks!' >> ios/Podfile
            echo '  use_modular_headers!' >> ios/Podfile
            echo '  flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))' >> ios/Podfile
            echo 'end' >> ios/Podfile
            echo "" >> ios/Podfile
            echo 'post_install do |installer|' >> ios/Podfile
            echo '  installer.pods_project.targets.each do |target|' >> ios/Podfile
            echo '    flutter_additional_ios_build_settings(target)' >> ios/Podfile
            echo '  end' >> ios/Podfile
            echo 'end' >> ios/Podfile
          fi
          cd ios && pod install --repo-update

      - name: Build unsigned IPA
        run: |
          cd mahalaxmi_admin
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Package into IPA
        run: |
          cd mahalaxmi_admin/build/ios/iphoneos && mkdir -p Payload && mv Runner.app Payload/ && zip -r admin_unsigned.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin_unsigned.ipa
          path: mahalaxmi_admin/build/ios/iphoneos/admin_unsigned.ipa
